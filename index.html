<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agencia JM</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #020817;
      color: white;
    }

    .app {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(0, 120, 255, 0.35), transparent 35%),
        linear-gradient(135deg, #020817, #061b3a);
      padding: 18px;
    }

    .hero {
      min-height: 420px;
      border-radius: 22px;
      background:
        linear-gradient(to bottom, rgba(2,8,23,0.05), rgba(2,8,23,0.92)),
        url("portada-agencia-jm.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center top;
      border: 1px solid rgba(0, 170, 255, 0.35);
      box-shadow: 0 0 35px rgba(0, 110, 255, 0.25);
      margin-bottom: 22px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .card {
      background: rgba(0, 26, 61, 0.82);
      border: 1px solid rgba(0, 170, 255, 0.28);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 0 18px rgba(0,0,0,0.25);
    }

    .card h2 {
      font-size: 34px;
      margin-bottom: 5px;
    }

    .card p {
      color: #d9e5f5;
    }

    .green {
      color: #55ff85;
      font-size: 14px;
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }

    .title h1 {
      font-size: 30px;
      letter-spacing: 2px;
    }

    .title span {
      color: #00aaff;
    }

    @media (max-width: 600px) {
      .hero {
        min-height: 280px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .title h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="title">
      <h1>AGENCIA <span>JM</span></h1>
      <p>Panel principal de administración</p>
    </div>

    <section class="hero"></section>

    <section class="cards">
      <div class="card">
        <h2>34</h2>
        <p>Total Emisoras</p>
        <small class="green">+3 esta semana</small>
      </div>

      <div class="card">
        <h2>29</h2>
        <p>Emisoras Activas</p>
        <small class="green">85% del total</small>
      </div>

      <div class="card">
        <h2>3</h2>
        <p>Administración</p>
        <small class="green">Jesús, Ruth y Yandira</small>
      </div>

      <div class="card">
        <h2>125</h2>
        <p>Academia</p>
        <small class="green">Formación de emisoras</small>
      </div>
    </section>

  </div>
</body>
</html>
