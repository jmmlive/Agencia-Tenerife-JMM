<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agencia Tenerife JMM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #0057ff, #00a2ff);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .search {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      border-left: 6px solid #00a2ff;
    }

    .card h3 {
      margin: 0 0 8px;
      color: #0057ff;
    }

    .dato {
      margin: 4px 0;
      font-size: 14px;
    }

    .rol {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 8px;
      background: #e9f1ff;
      color: #0057ff;
      font-size: 13px;
      margin-bottom: 8px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #0057ff;
      color: white;
      width: 100%;
      font-size: 15px;
    }

    .ficha {
      display: none;
      background: #fff;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    input, textarea, select {
      width: 100%;
      padding: 9px;
      margin: 6px 0 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>
  <h1>Agencia Tenerife JMM</h1>
  <p>Control de emisoras, administración y formación</p>
</header>

<div class="container">
  <input class="search" id="buscador" placeholder="Buscar por nombre, ID o país..." onkeyup="mostrarPersonas()">

  <div id="listaPersonas"></div>
</div>

<script>
const personas = [
  {
    nombre: "Jesús Melián",
    rol: "Agente Principal",
    id: "",
    pais: "España",
    nivel: "",
    foto: "",
    whatsapp: "",
    ciudad: "",
    estado: "Activo",
    observaciones: ""
  },
  {
    nombre: "Ruth María",
    rol: "Administración",
    id: "",
    pais: "Cuba",
    nivel: "",
    foto: "",
    whatsapp: "",
    ciudad: "",
    estado: "Activo",
    observaciones: ""
  },
  {
    nombre: "Yandira Vives",
    rol: "Administración",
    id: "",
    pais: "Cuba",
    nivel: "",
    foto: "",
    whatsapp: "",
    ciudad: "",
    estado: "Activo",
    observaciones: ""
  }
];

function mostrarPersonas() {
  const lista = document.getElementById("listaPersonas");
  const texto = document.getElementById("buscador").value.toLowerCase();

  lista.innerHTML = "";

  personas
    .filter(p =>
      p.nombre.toLowerCase().includes(texto) ||
      p.id.toLowerCase().includes(texto) ||
      p.pais.toLowerCase().includes(texto)
    )
    .forEach((p, index) => {
      lista.innerHTML += `
        <div class="card">
          <span class="rol">${p.rol}</span>
          <h3>${p.nombre}</h3>
          <div class="dato">🆔 ID: ${p.id || "Pendiente"}</div>
          <div class="dato">🌍 País: ${p.pais || "Pendiente"}</div>
          <div class="dato">⭐ Nivel: ${p.nivel || "Pendiente"}</div>
          <div class="dato">📌 Estado: ${p.estado || "Pendiente"}</div>

          <button onclick="abrirFicha(${index})">Ver / Editar ficha</button>

          <div class="ficha" id="ficha-${index}">
            <label>WhatsApp</label>
            <input value="${p.whatsapp}" placeholder="Añadir WhatsApp">

            <label>Ciudad</label>
            <input value="${p.ciudad}" placeholder="Añadir ciudad">

            <label>Estado</label>
            <select>
              <option>Activo</option>
              <option>En formación</option>
              <option>Inactivo</option>
              <option>Pendiente</option>
            </select>

            <label>Observaciones</label>
            <textarea placeholder="Escribir observaciones">${p.observaciones}</textarea>
          </div>
        </div>
      `;
    });
}

function abrirFicha(index) {
  const ficha = document.getElementById("ficha-" + index);
  ficha.style.display = ficha.style.display === "block" ? "none" : "block";
}

mostrarPersonas();
</script>

</body>
</html>
